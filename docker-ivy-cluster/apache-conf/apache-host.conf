<VirtualHost *:8080>
  Header add Set-Cookie "ROUTEID=.%{BALANCER_WORKER_ROUTE}e; path=/ivy" env=BALANCER_ROUTE_CHANGED

Include conf/members.conf

  # do not proxy local management endpoints
  ProxyPass /balancer-manager !
  ProxyPass /server-status !

  # backend members are configured with /ivy base path
  ProxyPass "/ivy" "balancer://ivycluster"
  ProxyPassReverse "/ivy" "balancer://ivycluster"

  RedirectMatch 302 ^/$ /ivy/system/

  <Location "/balancer-manager">
    SetHandler balancer-manager
    Require all granted
  </Location>
  <Location "/server-status">
    SetHandler server-status
    Require all granted
  </Location>
</VirtualHost>
