services:
  db:
    image: mariadb:11.8.8
    environment:
      MYSQL_ROOT_PASSWORD: 1234
    volumes:
     - "./mariadb/ivy.cnf:/etc/mysql/conf.d/ivy.cnf"

  loadbalancer:
    build: apache-conf
    user: root
    ports:
     - 9080:8080
    volumes:
     - "./apache-conf/apache-host.conf:/usr/local/apache2/conf/vhost.conf:ro"
     - "./apache-conf/members.conf:/usr/local/apache2/conf/members.conf:ro"

  ivy1:
    image: axonivy-engine-cluster-test:latest
    ports:
     - 9081:8080
    deploy:
      resources:
        limits:
          cpus: '2' 

  ivy2:
    image: axonivy-engine-cluster-test:latest
    ports:
     - 9082:8080
    deploy:
      resources:
        limits:
          cpus: '2' 

  ivy3:
    image: axonivy-engine-cluster-test:latest
    ports:
     - 9083:8080
    deploy:
      resources:
        limits:
          cpus: '2' 

  ivy4:
    image: axonivy-engine-cluster-test:latest
    ports:
     - 9084:8080
    deploy:
      resources:
        limits:
          cpus: '2' 

networks:
  default:
    external:
      name: ivycluster
